<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>H.I.C.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="app">
    <h1>H.I.C.</h1>
    
    <div id="main-menu">
        <button onclick="showPage('workout-list')">Начать тренировку</button>
        <button onclick="showPage('stats')">Статистика</button>
    </div>

    <div id="workout-list" style="display:none;">
        <h2>Тренировки</h2>
        <div id="workouts-container"></div>
        <button class="plus-btn" onclick="createWorkout()">+</button>
        <button onclick="showPage('main-menu')">Назад</button>
    </div>

    <div id="exercise-screen" style="display:none;">
        <h2 id="workout-title"></h2>
        <div id="exercises-container"></div>
        <button onclick="showExerciseForm()">+ Добавить упражнение</button>
        <button onclick="showPage('workout-list')">Назад</button>
    </div>

    <div id="exercise-form" style="display:none;">
        <h3>Новое упражнение</h3>
        <input type="text" id="ex-name" placeholder="Название (например, Жим)" style="width:100%; padding:10px; margin:5px 0;">
        <input type="number" id="ex-sets" placeholder="Подходы (1-10)" min="1" max="10" style="width:100%; padding:10px; margin:5px 0;">
        <input type="number" id="ex-rest" placeholder="Отдых (сек)" style="width:100%; padding:10px; margin:5px 0;">
        <button onclick="saveExercise()">Save</button>
    </div>
</div>

<script>
    let currentWorkoutIndex = null;

    function showPage(id) {
        document.querySelectorAll('.container > div:not(#app)').forEach(div => div.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function createWorkout() {
        const name = prompt("Название новой тренировки:");
        if (name) {
            let workouts = JSON.parse(localStorage.getItem('workouts') || '[]');
            workouts.push({ name: name, exercises: [] });
            localStorage.setItem('workouts', JSON.stringify(workouts));
            renderWorkouts();
        }
    }

    function openWorkout(index) {
        currentWorkoutIndex = index;
        const workouts = JSON.parse(localStorage.getItem('workouts'));
        document.getElementById('workout-title').innerText = workouts[index].name;
        renderExercises();
        showPage('exercise-screen');
    }

    function showExerciseForm() { showPage('exercise-form'); }

    function saveExercise() {
        const name = document.getElementById('ex-name').value;
        const sets = document.getElementById('ex-sets').value;
        const rest = document.getElementById('ex-rest').value;
        
        let workouts = JSON.parse(localStorage.getItem('workouts'));
        workouts[currentWorkoutIndex].exercises.push({ name, sets, rest });
        localStorage.setItem('workouts', JSON.stringify(workouts));
        
        renderExercises();
        showPage('exercise-screen');
    }

    function renderExercises() {
        const container = document.getElementById('exercises-container');
        const workouts = JSON.parse(localStorage.getItem('workouts'));
        container.innerHTML = workouts[currentWorkoutIndex].exercises.map(ex => 
            `<div class="card">${ex.name} (${ex.sets} подх., отдых ${ex.rest}с)</div>`
        ).join('');
    }

    function renderWorkouts() {
        const container = document.getElementById('workouts-container');
        const workouts = JSON.parse(localStorage.getItem('workouts') || '[]');
        container.innerHTML = workouts.map((w, index) => 
            `<div class="card" onclick="openWorkout(${index})">${w.name}</div>`
        ).join('');
    }

    renderWorkouts();
</script>
</body>
</html>
