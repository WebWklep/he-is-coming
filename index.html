<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>H.I.C.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="app">
    <h1>H.I.C.</h1>
    
    <div id="main-menu">
        <button onclick="showPage('workout-list')">Начать тренировку</button>
        <button onclick="showPage('stats')">Статистика</button>
    </div>

    <div id="workout-list" style="display:none;">
        <button class="back-btn" onclick="showPage('main-menu')">←</button>
        <h2>Тренировки</h2>
        <div id="workouts-container"></div>
        <button class="plus-btn" onclick="createWorkout()">+</button>
    </div>

    <div id="exercise-screen" style="display:none;">
        <button class="back-btn" onclick="showPage('workout-list')">←</button>
        <h2 id="workout-title"></h2>
        <div id="exercises-container"></div>
        <button onclick="showExerciseForm()">+ Добавить упражнение</button>
    </div>

    <div id="exercise-form" style="display:none;">
        <button class="back-btn" onclick="showPage('exercise-screen')">←</button>
        <h3>Новое упражнение</h3>
        <input type="text" id="ex-name" placeholder="Название" style="width:100%; padding:10px; margin:10px 0; border:1px solid #000;">
        
        <p>Подходы:</p>
        <div class="option-grid" id="sets-options"></div>
        
        <p>Отдых (сек):</p>
        <div class="option-grid" id="rest-options"></div>
        
        <button onclick="saveExercise()">Сохранить упражнение</button>
    </div>
</div>

<script>
    let currentWorkoutIndex = null;
    let selectedSets = 3;
    let selectedRest = 60;

    function showPage(id) {
        document.querySelectorAll('.container > div:not(#app)').forEach(div => div.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    // Генерация кнопок-вариантов
    function initOptions() {
        const sets = [3, 4, 5];
        const rests = [30, 40, 50, 60, 80, 120];
        document.getElementById('sets-options').innerHTML = sets.map(s => `<button class="opt-btn" onclick="setVal('sets', ${s})">${s}</button>`).join('');
        document.getElementById('rest-options').innerHTML = rests.map(r => `<button class="opt-btn" onclick="setVal('rest', ${r})">${r}</button>`).join('');
    }

    function setVal(type, val) {
        if(type === 'sets') selectedSets = val;
        if(type === 'rest') selectedRest = val;
        // Можно добавить визуальное выделение активной кнопки здесь
    }

    function saveExercise() {
        const name = document.getElementById('ex-name').value;
        let workouts = JSON.parse(localStorage.getItem('workouts'));
        workouts[currentWorkoutIndex].exercises.push({ name, sets: selectedSets, rest: selectedRest });
        localStorage.setItem('workouts', JSON.stringify(workouts));
        renderExercises();
        showPage('exercise-screen');
    }

    // ... (остальные функции renderWorkouts и т.д. остаются прежними)
    initOptions();
</script>
</body>
</html>
