<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>H.I.C.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="app">
    <h1>H.I.C.</h1>
    
    <div id="main-menu">
        <button onclick="showPage('workout-list')">Начать тренировку</button>
        <button onclick="showPage('stats')">Статистика (Stats)</button>
    </div>

    <div id="workout-list" style="display:none;">
        <h2>Тренировки</h2>
        <div id="workouts-container"></div>
        <button class="plus-btn" onclick="createWorkout()">+</button>
        <button onclick="showPage('main-menu')">Назад</button>
    </div>
</div>

<script>
    function showPage(id) {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('workout-list').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }

    function createWorkout() {
        const name = prompt("Название новой тренировки:");
        if (name) {
            let workouts = JSON.parse(localStorage.getItem('workouts') || '[]');
            workouts.push({ name: name, exercises: [] });
            localStorage.setItem('workouts', JSON.stringify(workouts));
            renderWorkouts();
        }
    }

    function renderWorkouts() {
        const container = document.getElementById('workouts-container');
        const workouts = JSON.parse(localStorage.getItem('workouts') || '[]');
        container.innerHTML = workouts.map(w => `<div class="card">${w.name}</div>`).join('');
    }

    // Инициализация
    renderWorkouts();
</script>
</body>
</html>
